# ============================================================
# .github/workflows/clang-format.yml
# Checks that all first-party source files are clang-format
# clean on every push and pull request.
# ============================================================

name: Clang Format

on:
  push:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt update && sudo apt install -y clang-format

      - name: Check formatting
        run: |
          find include tests examples benchmarks regression \
            \( -name "*.h" -o -name "*.hpp" -o -name "*.cpp" -o -name "*.tpp" \) \
            -exec clang-format --dry-run --Werror {} +
