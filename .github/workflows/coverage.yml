# ============================================================
# .github/workflows/coverage.yml
# Builds and runs the test suite with coverage instrumentation,
# uploading an HTML report, on every push and pull request.
# ============================================================

name: Coverage

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ lcov

      # Benchmarks/tools/examples are skipped: instrumenting a fetched
      # third-party dependency (tools/ pulls in nlohmann_json) with
      # --coverage adds irrelevant, unowned coverage noise and slows
      # the build for no benefit.
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-update=atomic" \
            -DBUILD_BENCHMARKS=OFF \
            -DBUILD_TOOLS=OFF \
            -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage.info \
            --ignore-errors negative,gcov,mismatch

          lcov --remove coverage.info \
            '/usr/*' \
            --output-file coverage.filtered.info

      - name: Generate HTML report
        run: |
          genhtml coverage.filtered.info \
            --output-directory coverage-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
