# ============================================================
# .github/workflows/build.yml
# Builds and runs the test suite across a matrix of OS,
# compiler, and build-type combinations.
# ============================================================

name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    name: "${{ matrix.os }} | ${{ matrix.compiler }} | ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            compiler: GCC
            cxx: g++
            build_type: Debug

          - os: ubuntu-latest
            compiler: GCC
            cxx: g++
            build_type: Release

          - os: ubuntu-latest
            compiler: Clang
            cxx: clang++
            build_type: Debug

          - os: ubuntu-latest
            compiler: Clang
            cxx: clang++
            build_type: Release

          - os: windows-latest
            compiler: MSVC
            build_type: Debug

          - os: windows-latest
            compiler: MSVC
            build_type: Release

          - os: macos-latest
            compiler: AppleClang
            cxx: clang++
            build_type: Debug

          - os: macos-latest
            compiler: AppleClang
            cxx: clang++
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++ clang

      # Only tests/ are exercised by this workflow (via ctest below) —
      # benchmarks/tools/examples are skipped so the matrix isn't
      # paying to build (and, for tools/, fetch nlohmann_json for)
      # targets nothing here actually runs, on every one of 8 legs.
      - name: Configure
        env:
          CXX: ${{ matrix.cxx || '' }}
        run: >
          cmake -S . -B build-${{ matrix.compiler }}-${{ matrix.build_type }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_BENCHMARKS=OFF \
            -DBUILD_TOOLS=OFF \
            -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build-${{ matrix.compiler }}-${{ matrix.build_type }} --config ${{ matrix.build_type }}

      - name: Run tests
        run: ctest --test-dir build-${{ matrix.compiler }}-${{ matrix.build_type }} -C ${{ matrix.build_type }} --output-on-failure
